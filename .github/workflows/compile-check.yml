name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  server-typecheck:
    name: Server TypeScript Check
    runs-on: ubuntu-latest
    # @ludiars/vestigium を GitHub Packages から取得するための token。
    # server/.npmrc が ${NODE_AUTH_TOKEN} を参照する。
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc --noEmit

      # 認証コア (JWT / PASETO トークンの署名・検証・異常系) の unit テスト。
      # DB/Redis 不要で動く純ロジックのみ。
      - name: Tests
        run: pnpm test

  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc -b --noEmit

  packages-typecheck:
    name: Packages TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/env-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc --noEmit
