name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  server-typecheck:
    name: Server TypeScript Check
    runs-on: ubuntu-latest
    # @ludiars/vestigium を GitHub Packages から取得するための token。
    # server/.npmrc が ${NODE_AUTH_TOKEN} を参照する。
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # pnpm v10 はリポジトリ同梱 .npmrc 内の ${ENV} 展開を拒否する
      # (repository-controlled credential の env 展開禁止)。そのため
      # @ludiars (GitHub Packages) の token は home の ~/.npmrc に展開済みの
      # 値で書き込む。working-directory 既定は server だが ~ は home を指す。
      - name: Authenticate to GitHub Packages
        run: |
          echo "@ludiars:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc --noEmit

      # 認証コア (JWT / PASETO トークンの署名・検証・異常系) の unit テスト。
      # DB/Redis 不要で動く純ロジックのみ。
      - name: Tests
        run: pnpm test

  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc -b --noEmit

  packages-typecheck:
    name: Packages TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/env-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc --noEmit
