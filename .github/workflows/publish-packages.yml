name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'
      - 'packages/*/src/**'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - id-cache
          - id-service
          - service-adapter
          - env-cli
          - composite
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ludiars'

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: packages/${{ matrix.package }}
        run: npm run build

      - name: Check if version changed
        id: version-check
        working-directory: packages/${{ matrix.package }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          # Check if this version already exists on registry
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version --registry=https://npm.pkg.github.com 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (current: $PUBLISHED_VERSION)"
          fi

      - name: Publish
        if: steps.version-check.outputs.skip != 'true'
        working-directory: packages/${{ matrix.package }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
