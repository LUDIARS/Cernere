name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/package.json'
      - 'packages/*/src/**'
  workflow_dispatch:
    inputs:
      package:
        description: "Publish only this package (optional)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    strategy:
      # 1 パッケージ publish 失敗でも他を止めない. バージョン据え置きの
      # パッケージは skip 扱いで fail せず通るが、万一 fail したときに
      # 連鎖キャンセルを避ける.
      fail-fast: false
      matrix:
        package:
          - id-cache
          - id-service
          - service-adapter
          - env-cli
          - composite
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ludiars'

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: packages/${{ matrix.package }}
        run: npm run build

      - name: Check if version changed
        id: version-check
        working-directory: packages/${{ matrix.package }}
        env:
          # private registry への読み取りにも auth が要る. 未設定だと
          # npm view が黙って空文字を返し、publish が "already published"
          # で落ちる回帰を起こしていた (Cernere issue: 以前の publish 失敗).
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          # Check if this version already exists on registry. versions は
          # JSON 配列 or 単一文字列で返る。404 (初回) は空で扱う。
          PUBLISHED_JSON=$(npm view "$PACKAGE_NAME" versions --json --registry=https://npm.pkg.github.com 2>/dev/null || echo "[]")

          if echo "$PUBLISHED_JSON" | grep -q "\"$LOCAL_VERSION\""; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION already on registry, skipping publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION"
          fi

      - name: Publish
        if: steps.version-check.outputs.skip != 'true'
        working-directory: packages/${{ matrix.package }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
