services:
  postgres:
    image: postgres:17
    container_name: cernere-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cernere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cernere}
      POSTGRES_DB: ${POSTGRES_DB:-cernere}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: cernere-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
