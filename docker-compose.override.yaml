# Local override — inject PASETO keypair + point DATABASE_URL/REDIS_URL at
# infra_default so Cernere can boot without Infisical's prod URLs.
# Do NOT commit (gitignored). PASETO keys generated locally by
# scripts/generate-paseto-keypair.ts.
services:
  backend-dev:
    environment:
      DATABASE_URL: "postgresql://cernere:cernere@infra-postgres-1:5432/cernere"
      REDIS_URL: "redis://infra-redis-1:6379/1"
      CERNERE_PASETO_SECRET_KEY: "IztdsZMdEV1l5A18byfNXJ/cFRkmC36hZoqa3RrWA5Q="
      CERNERE_PASETO_PUBLIC_KEY: "8W71rV8GDGP0J9Sz9+FfcaRfnblGQUe3NXRW5vj1ow4="
      CERNERE_PASETO_KID: "v1"
    networks:
      - default
      - infra_default

networks:
  infra_default:
    external: true
