services:
  postgres:
    image: postgres:17-alpine
    container_name: cernere-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cernere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cernere}
      POSTGRES_DB: ${POSTGRES_DB:-cernere}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cernere}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cernere-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: node:22-alpine
    container_name: cernere-backend
    working_dir: /app/server
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ./server:/app/server
      - ./migrations:/app/migrations
      - backend-node-modules:/app/server/node_modules
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cernere}:${POSTGRES_PASSWORD:-cernere}@postgres:5432/${POSTGRES_DB:-cernere}"
      REDIS_URL: "redis://redis:6379"
      LISTEN_PORT: "8080"
      FRONTEND_URL: "http://localhost:${FRONTEND_PORT:-5173}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npx tsx watch src/index.ts"
    profiles:
      - dev

  frontend:
    image: node:22-alpine
    container_name: cernere-frontend
    working_dir: /app/frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    environment:
      VITE_BACKEND_URL: "http://cernere-backend:8080"
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  pg-data:
  redis-data:
  backend-node-modules:
  frontend-node-modules:
