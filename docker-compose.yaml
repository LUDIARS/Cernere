# Cernere — 本番構成 (フロント + バックエンド)
#
# PostgreSQL / Redis は外部 (Infra) を使用する前提。
# 接続先は環境変数 DATABASE_URL, REDIS_URL で指定。
#
# Usage:
#   docker compose --profile prod up -d           # prod (ビルド済みイメージ)
#   docker compose --profile dev up               # dev (ホットリロード)
#   docker compose -f docker-compose.yaml \
#     -f docker-compose.standalone.yaml up -d      # all-in-one (DB込み)

services:
  # ── 本番モード (--profile prod) ─────────────────────────
  # ビルド済みイメージで起動

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cernere-backend
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://cernere_user:cernere@localhost:5432/cernere}"
      REDIS_URL: "${REDIS_URL:-redis://localhost:6379/0}"
      LISTEN_PORT: "8080"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      JWT_SECRET: "${JWT_SECRET:-}"
      NODE_ENV: "production"
    restart: unless-stopped
    profiles:
      - prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cernere-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - prod

  # ── 開発モード (--profile dev) ──────────────────────────
  # ソースマウント + ホットリロード

  backend-dev:
    image: node:22-slim
    container_name: cernere-backend-dev
    working_dir: /app/server
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - ./server:/app/server
      - ./migrations:/app/migrations
      - backend-node-modules:/app/server/node_modules
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://cernere_user:cernere@localhost:5432/cernere}"
      REDIS_URL: "${REDIS_URL:-redis://localhost:6379/0}"
      LISTEN_PORT: "8080"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      JWT_SECRET: "${JWT_SECRET:-}"
      NODE_ENV: "development"
    command: sh -c "apt-get update -qq && apt-get install -y -qq git > /dev/null && npm i -g pnpm && pnpm install && npx tsx watch src/index.ts"
    profiles:
      - dev

  frontend-dev:
    image: node:22-alpine
    container_name: cernere-frontend-dev
    working_dir: /app/frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    environment:
      VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://cernere-backend-dev:8080}"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev

  # ── MailHog (dev SMTP キャッチャー) ─────────────────────
  # 1025: SMTP / 8025: Web UI (http://localhost:8025)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cernere-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    restart: unless-stopped
    profiles:
      - dev
      - prod

volumes:
  backend-node-modules:
  frontend-node-modules:
