services:
  postgres:
    image: postgres:17-alpine
    platform: linux/amd64
    container_name: cernere-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cernere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cernere}
      POSTGRES_DB: ${POSTGRES_DB:-cernere}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cernere}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: cernere-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: rust:1.87-slim
    platform: linux/amd64
    container_name: cernere-backend
    working_dir: /app
    ports:
      - "${LISTEN_PORT:-8080}:8080"
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cernere}:${POSTGRES_PASSWORD:-cernere}@postgres:5432/${POSTGRES_DB:-cernere}"
      REDIS_URL: "redis://redis:6379"
      LISTEN_ADDR: "0.0.0.0:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "
        cargo install cargo-watch --locked 2>/dev/null || true;
        cargo watch -x run
      "
    profiles:
      - dev

  frontend:
    image: node:22-alpine
    platform: linux/amd64
    container_name: cernere-frontend
    working_dir: /app/frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  pg-data:
  redis-data:
  cargo-cache:
  target-cache:
  frontend-node-modules:
